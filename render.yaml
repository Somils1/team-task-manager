services:
  - type: web
    name: task-manager-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free

  - type: static
    name: team-manager-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://task-manager-backend-0cqp.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html